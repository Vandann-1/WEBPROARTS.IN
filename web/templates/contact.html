{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Web Pro Arts | Digital Agency Vasai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .bg-contact { 
            background-image: radial-gradient(#28b8d915 1px, transparent 1px); 
            background-size: 30px 30px; 
        }
        .map-placeholder {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-image: url('https://www.google.com/maps/vt/pb=!1m4!1m3!1i13!2i5846!3i3691!2m3!1e0!2sm!3i627116124!3m8!2sen!3sus!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!1e0!23i4111425');
            background-blend-mode: overlay;
            background-size: cover;
        }
        .form-input {
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }
        .form-input:focus {
            border-color: #28b8d9;
            box-shadow: 0 0 0 4px rgba(40, 184, 217, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="w-full bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            <a href="/" class="flex items-center">
                <img src="{% static 'img/logo-webproarts.png' %}" alt="WebProArts" class="h-12 lg:h-16 w-auto object-contain mix-blend-multiply">
            </a>
            <nav class="hidden lg:flex items-center gap-10 text-[14px] font-bold text-slate-600">
                <a href="/" class="hover:text-[#28b8d9]">Home</a>
                <a href="#" class="hover:text-[#28b8d9]">Services</a>
                <a href="#" class="bg-[#16598a] text-white px-8 py-3 rounded-xl hover:bg-[#28b8d9] transition-all">Free Audit</a>
            </nav>
        </div>
    </header>

    <section class="py-20 bg-contact">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                
                <div class="lg:col-span-7 bg-white p-8 md:p-16 rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-50">
                    <div class="mb-10">
                        <span class="text-[#28b8d9] font-black uppercase tracking-[0.3em] text-[10px]">Get In Touch</span>
                        <h1 class="text-4xl md:text-6xl font-black text-[#04131a] mt-4 tracking-tighter">Let’s Start Your <span class="text-[#16598a]">Project.</span></h1>
                    </div>

                    <form action="#" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex flex-col gap-2">
                                <label class="text-[11px] font-black uppercase text-slate-400 ml-1 tracking-widest">Full Name</label>
                                <input type="text" placeholder="" class="form-input p-5 rounded-2xl bg-slate-50/50 text-sm">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-[11px] font-black uppercase text-slate-400 ml-1 tracking-widest">Email Address</label>
                                <input type="email" placeholder="" class="form-input p-5 rounded-2xl bg-slate-50/50 text-sm">
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-[11px] font-black uppercase text-slate-400 ml-1 tracking-widest">Interested Service</label>
                            <select class="form-input p-5 rounded-2xl bg-slate-50/50 text-sm appearance-none cursor-pointer">
                                <option>Video Editing & Production</option>
                                <option>Social Media Management</option>
                                <option>Full Digital Branding</option>
                            </select>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-[11px] font-black uppercase text-slate-400 ml-1 tracking-widest">How can we help?</label>
                            <textarea rows="5" placeholder="Tell us about your brand goals..." class="form-input p-5 rounded-3xl bg-slate-50/50 text-sm resize-none"></textarea>
                        </div>

                        <button class="w-full py-6 bg-[#16598a] text-white font-black rounded-2xl shadow-xl shadow-[#16598a]/20 hover:bg-[#28b8d9] hover:-translate-y-1 transition-all uppercase tracking-widest text-xs">
                            Send Message <i class="fas fa-paper-plane ml-2"></i>
                        </button>
                    </form>
                </div>

                <div class="lg:col-span-5 flex flex-col gap-8">
                    
                    <div class="grid grid-cols-1 gap-6">
                        <div class="p-8 bg-white border border-slate-100 rounded-[2.5rem] flex items-start gap-6 hover:border-[#28b8d9]/30 transition-all">
                            <div class="w-14 h-14 bg-[#28b8d9]/10 rounded-2xl flex items-center justify-center text-[#16598a] shrink-0">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Email Us</p>
                                <a href="mailto:webproarts@gmail.com" class="text-lg font-bold text-[#04131a] hover:text-[#28b8d9]">webproarts@gmail.com</a>
                            </div>
                        </div>

                        <div class="p-8 bg-white border border-slate-100 rounded-[2.5rem] flex items-start gap-6 hover:border-[#28b8d9]/30 transition-all">
                            <div class="w-14 h-14 bg-[#16598a]/10 rounded-2xl flex items-center justify-center text-[#16598a] shrink-0">
                                <i class="fas fa-phone-alt"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Call Anytime</p>
                                <a href="tel:+919561635544" class="text-lg font-bold text-[#04131a] hover:text-[#28b8d9]">+91 95616 35544</a>
                            </div>
                        </div>
                    </div>

                    <div class="flex-grow min-h-[350px] relative rounded-[3rem] overflow-hidden shadow-xl border-4 border-white group">
                        <div class="absolute inset-0 map-placeholder grayscale group-hover:grayscale-0 transition-all duration-1000"></div>
                        
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="relative">
                                <div class="w-4 h-4 bg-[#28b8d9] rounded-full animate-ping absolute"></div>
                                <div class="w-4 h-4 bg-[#16598a] rounded-full relative border-2 border-white"></div>
                                <div class="absolute -top-16 left-1/2 -translate-x-1/2 bg-white px-4 py-2 rounded-xl shadow-lg border border-slate-100 whitespace-nowrap">
                                    <p class="text-[10px] font-black text-[#16598a]">WEB PRO ARTS</p>
                                    <p class="text-[9px] font-bold text-slate-400">Vasai-Virar, Maharashtra</p>
                                </div>
                            </div>
                        </div>

                        <div class="absolute bottom-6 right-6 flex flex-col gap-2">
                            <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center text-xs font-bold text-slate-400">+</div>
                            <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center text-xs font-bold text-slate-400">-</div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <footer class="py-12 bg-white border-t border-slate-50">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Web Pro Arts Studio • Vasai West</p>
            <div class="flex gap-8">
                <a href="https://www.instagram.com/webproarts/" class="text-slate-400 hover:text-[#28b8d9] text-sm"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-slate-400 hover:text-[#28b8d9] text-sm"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="text-slate-400 hover:text-[#28b8d9] text-sm"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
